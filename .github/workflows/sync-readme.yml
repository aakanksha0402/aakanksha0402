name: Sync README from website repo

on:
  repository_dispatch:
    types: [readme-updated]
  workflow_dispatch:

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: aakanksha0402/aakanksha0402.github.io
          path: website-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          path: current-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy README
        run: cp website-repo/README.md current-repo/README.md

      - name: Check for changes
        id: check
        working-directory: current-repo
        run: |
          if git diff --quiet README.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.check.outputs.has_changes == 'true'
        working-directory: current-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        working-directory: current-repo
        env:
          # we need a PAT here because GITHUB_TOKEN can't push when the workflow
          # is triggered by a repository_dispatch from another repo
          PAT: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git add README.md
          git commit -m "chore: sync README from aakanksha0402.github.io"
          git push https://x-access-token:${PAT}@github.com/aakanksha0402/aakanksha0402.git HEAD:main
