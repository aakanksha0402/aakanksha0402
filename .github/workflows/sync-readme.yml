name: Sync README from website repo

permissions:
  contents: write

on:
  repository_dispatch:
    types: [readme-updated]
  workflow_dispatch:

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Download README from website repo
        run: |
          # fetch the public raw README from the website repo (fast, avoids cross-repo checkout)
          curl -fsSL -o website-repo-README.md https://raw.githubusercontent.com/aakanksha0402/aakanksha0402.github.io/main/README.md
          mkdir -p website-repo
          mv website-repo-README.md website-repo/README.md

      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          path: current-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      # checkout current repo (uses GITHUB_TOKEN from permissions above)
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          path: current-repo

      - name: Copy README
        run: cp website-repo/README.md current-repo/README.md

      - name: Check for changes
        id: check
        working-directory: current-repo
        run: |
          if git diff --quiet README.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.check.outputs.has_changes == 'true'
        working-directory: current-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        working-directory: current-repo
        run: |
          git add README.md
          git commit -m "chore: sync README from aakanksha0402.github.io"
          git push origin HEAD:main
